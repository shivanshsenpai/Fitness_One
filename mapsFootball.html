<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Nearby Football Turfs | Fit Connect</title>
    <link rel="stylesheet" href="/Maps.css">
    <!-- Leaflet Assets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/6c13d4b345.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="map-page-container">
        <!-- Sidebar Spot List -->
        <aside class="sidebar-panel">
            <header class="sidebar-header">
                <a href="/explore" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Categories</a>
                <h2>Football Turfs</h2>
                <p>Find standard synthetic and natural grass football pitches nearby.</p>
            </header>

            <div id="spotsList" class="spots-list">
                <!-- Spot Cards will be generated here -->
            </div>
        </aside>

        <!-- Leaflet Map Container -->
        <main class="map-panel">
            <div id="map"></div>
        </main>
    </div>

    <script>
        let map, userCoords, activeRouteLine;
        let markers = {};

        // Default Coordinate fallback (New Delhi)
        let defaultCoords = { lat: 28.6139, lng: 77.2090 };

        // Nearby Football details database
        const footballSpots = [
            { id: 1, name: "Strikers Turf Arena", offsetLat: 0.0032, offsetLng: -0.0050, rating: "4.8 ★", address: "Astra Sports Complex" },
            { id: 2, name: "Camp Nou Synthetic Pitch", offsetLat: -0.0055, offsetLng: 0.0042, rating: "4.7 ★", address: "Vanguard Ground, Lane 10" },
            { id: 3, name: "Elite Football Academy", offsetLat: 0.0078, offsetLng: 0.0038, rating: "4.6 ★", address: "Kickoff Arena, Floor 1" }
        ];

        function initMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userCoords = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        setupMapAndMarkers(userCoords);
                    },
                    () => {
                        userCoords = defaultCoords;
                        setupMapAndMarkers(userCoords);
                    }
                );
            } else {
                userCoords = defaultCoords;
                setupMapAndMarkers(userCoords);
            }
        }

        function setupMapAndMarkers(center) {
            map = L.map('map', { zoomControl: false }).setView([center.lat, center.lng], 14);
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            // User Icon Pulse
            const pulseIcon = L.divIcon({
                className: 'user-pulse-marker',
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            L.marker([center.lat, center.lng], { icon: pulseIcon }).addTo(map)
                .bindPopup("<h3>Your Location</h3><p>Active coordinate center.</p>");

            // Generate Spots List & Markers
            const listDiv = document.getElementById('spotsList');
            listDiv.innerHTML = '';

            footballSpots.forEach(turf => {
                const turfLat = center.lat + turf.offsetLat;
                const turfLng = center.lng + turf.offsetLng;

                // Add map marker
                const customIcon = L.divIcon({
                    html: `<i class="fa-solid fa-futbol" style="color: var(--accent-cyan); font-size: 1.5rem; text-shadow: 0 0 8px rgba(0,240,255,0.6);"></i>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12],
                    className: 'football-map-pin'
                });

                const marker = L.marker([turfLat, turfLng], { icon: customIcon }).addTo(map)
                    .bindPopup(`<h3>${turf.name}</h3><p>${turf.address}</p><p>Rating: ${turf.rating}</p>`);
                
                markers[turf.id] = { marker, lat: turfLat, lng: turfLng };

                // Add list Card
                const card = document.createElement('div');
                card.className = 'spot-card';
                card.id = `card-${turf.id}`;
                card.onclick = () => focusSpot(turf.id);
                card.innerHTML = `
                    <div class="spot-name">${turf.name}</div>
                    <div class="spot-meta">
                        <span><i class="fa-solid fa-star"></i> ${turf.rating}</span>
                        <span>${turf.address}</span>
                    </div>
                    <button class="btn-directions" onclick="event.stopPropagation(); drawRoute(${turf.id})">
                        <i class="fa-solid fa-route"></i> Trace Directions
                    </button>
                `;
                listDiv.appendChild(card);
            });
        }

        function focusSpot(id) {
            document.querySelectorAll('.spot-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${id}`).classList.add('active');

            const target = markers[id];
            map.setView([target.lat, target.lng], 15, { animate: true, duration: 1.0 });
            target.marker.openPopup();
        }

        function drawRoute(id) {
            focusSpot(id);
            const target = markers[id];

            if (activeRouteLine) {
                map.removeLayer(activeRouteLine);
            }

            activeRouteLine = L.polyline(
                [[userCoords.lat, userCoords.lng], [target.lat, target.lng]], 
                { color: 'var(--accent-cyan)', weight: 4, dashArray: '6, 12', opacity: 0.85 }
            ).addTo(map);

            map.fitBounds(activeRouteLine.getBounds(), { padding: [50, 50] });
        }

        window.onload = initMap;
    </script>
</body>
</html>
