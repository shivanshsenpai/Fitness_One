<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Sports Hubs | Fit Connect</title>
    <link rel="stylesheet" href="maps_1.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/6c13d4b345.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="logo.png" alt="logo" />
                <span>Fit Connect</span>
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/#mission">About</a></li>
                    <li><a href="/explore" class="active">Explore</a></li>
                    <li><a href="/find-friends">FitMatch</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-wrapper">
        <div class="content-container">
            <span class="subheading">GEOLOCATION MAPPING</span>
            <h1>Find Sports Places Near You</h1>
            <p class="description">Choose a training category below to view nearby sports centers, gyms, and courts on an interactive dark-themed map.</p>
        </div>

        <div class="map-visual">
            <img class="img-map" src="map_2.gif" alt="Animated Map Radar">
        </div>

        <div class="categories-grid">
            <a href="/explore/badminton" class="category-card">
                <i class="fa-solid fa-table-tennis-paddle-ball card-icon"></i>
                <span class="btn-text">Badminton</span>
            </a>
            <a href="/explore/cricket" class="category-card">
                <i class="fa-solid fa-baseball-bat-ball card-icon"></i>
                <span class="btn-text">Cricket</span>
            </a>
            <a href="/explore/football" class="category-card">
                <i class="fa-solid fa-ranking-star card-icon"></i>
                <span class="btn-text">Football</span>
            </a>
            <a href="/explore/gym" class="category-card">
                <i class="fa-solid fa-dumbbell card-icon"></i>
                <span class="btn-text">Gyms</span>
            </a>
            <a href="/explore/volleyball" class="category-card">
                <i class="fa-solid fa-volleyball card-icon"></i>
                <span class="btn-text">Volleyball</span>
            </a>
            <a href="/explore/yoga" class="category-card">
                <i class="fa-solid fa-spa card-icon"></i>
                <span class="btn-text">Yoga Studios</span>
            </a>
        </div>
    </div>
</body>
</html>
