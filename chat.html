<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy Chat Room | Fit Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/6c13d4b345.js" crossorigin="anonymous"></script>
    <style>
        /* Chat Dashboard CSS Styles */
        :root {
            --bg-primary: #080c14;
            --bg-secondary: #0f172a;
            --bg-card: rgba(15, 23, 42, 0.65);
            --border-glow: rgba(0, 240, 255, 0.12);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-cyan: #00f0ff;
            --accent-purple: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #00f0ff 0%, #8b5cf6 100%);
            --card-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.8);
            --glass-blur: blur(16px);
            --transition-smooth: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            background-image: radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.08) 0%, transparent 40%);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navbar */
        .navbar {
            height: 80px;
            width: 100%;
            background: rgba(8, 12, 20, 0.8);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            flex-shrink: 0;
            z-index: 100;
        }

        .nav-container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 800;
            font-size: 1.4rem;
        }

        .nav-logo img {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .btn-exit {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition-smooth);
        }

        .btn-exit:hover {
            color: var(--accent-cyan);
            transform: translateX(-2px);
        }

        /* Split Main Layout */
        .chat-layout {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 340px 1fr;
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            height: calc(100vh - 80px);
            padding: 1.5rem 2rem 2rem;
            gap: 1.5rem;
            overflow: hidden;
        }

        /* Left Partner Sidebar */
        .partner-panel {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem 1.8rem;
            box-shadow: var(--card-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .avatar-container {
            margin-bottom: 1.5rem;
        }

        .css-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: #000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .partner-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .status-badge {
            font-size: 0.8rem;
            font-weight: 600;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2rem;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        .details-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: left;
            margin-bottom: 2rem;
        }

        .detail-item {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .detail-item strong {
            color: var(--text-primary);
        }

        .detail-item i {
            color: var(--accent-cyan);
            margin-right: 6px;
            width: 16px;
        }

        .tip-box {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
            background: rgba(0, 240, 255, 0.03);
            border: 1px dashed rgba(0, 240, 255, 0.15);
            padding: 1rem;
            border-radius: 8px;
        }

        /* Right Message Viewport */
        .chat-panel {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        /* Messages Window */
        .messages-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Chat Bubbles */
        .message-bubble {
            max-width: 65%;
            display: flex;
            flex-direction: column;
            animation: bubblePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bubblePop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .message-bubble.incoming {
            align-self: flex-start;
        }

        .message-bubble.outgoing {
            align-self: flex-end;
            align-items: flex-end;
        }

        .bubble-content {
            padding: 0.9rem 1.4rem;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .incoming .bubble-content {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .outgoing .bubble-content {
            background: var(--accent-gradient);
            color: #000;
            font-weight: 500;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px -3px rgba(0, 240, 255, 0.25);
        }

        .bubble-timestamp {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.35rem;
            padding: 0 4px;
        }

        /* Chat Input Footer */
        .chat-input-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(8, 12, 20, 0.4);
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .message-input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            padding: 1rem 1.4rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition-smooth);
        }

        .message-input:focus {
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1);
        }

        .btn-send {
            height: 50px;
            width: 50px;
            border-radius: 12px;
            border: none;
            background: var(--accent-gradient);
            color: #000;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            box-shadow: 0 5px 15px -3px rgba(0, 240, 255, 0.35);
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -3px rgba(0, 240, 255, 0.55);
        }

        /* Typing indicator overlay */
        .typing-indicator {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 5px;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1.1); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 860px) {
            .chat-layout {
                grid-template-columns: 1fr;
            }
            .partner-panel {
                display: none;
            }
        }
        @media (max-width: 640px) {
            .chat-layout {
                padding: 1rem;
            }
            .messages-window {
                padding: 1rem;
            }
            .chat-input-footer {
                padding: 1rem;
            }
            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="logo.png" alt="logo" />
                <span>Fit Connect</span>
            </a>
            <a href="/find-friends/matches" class="btn-exit"><i class="fa-solid fa-arrow-right-from-bracket"></i> Exit Room</a>
        </div>
    </header>

    <!-- Chat Dashboard Container -->
    <div class="chat-layout">
        <!-- Left panel buddy info -->
        <aside class="partner-panel">
            <div class="avatar-container">
                <div id="partnerAvatar" class="css-avatar">U</div>
            </div>
            <h2 id="partnerNameText" class="partner-name">User Name</h2>
            <div class="status-badge">Online</div>

            <div class="details-box">
                <div class="detail-item"><i class="fa-regular fa-clock"></i> Training Hours: <strong id="partnerHourText">8AM-9AM</strong></div>
                <div class="detail-item"><i class="fa-solid fa-circle-info"></i> Connection status: <strong>Mutual Match</strong></div>
                <div class="detail-item"><i class="fa-solid fa-shield-halved"></i> Room: <strong>End-to-End Chat</strong></div>
            </div>

            <div class="tip-box">
                <strong>Gym Buddy Tip:</strong> Keep chats coordinate and respect schedule timings. Double check local location details before meeting up.
            </div>
        </aside>

        <!-- Right panel message log -->
        <main class="chat-panel">
            <!-- Message Window -->
            <div id="messagesWindow" class="messages-window">
                <!-- Messages populated dynamically -->
            </div>

            <!-- Chat Footer Input -->
            <footer class="chat-input-footer">
                <input type="text" id="messageInput" class="message-input" placeholder="Type a message to your gym buddy..." autocomplete="off">
                <button id="sendBtn" class="btn-send" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </footer>
        </main>
    </div>

    <script>
        // Parse Query Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const buddyName = urlParams.get('user') || 'Gym Buddy';
        const buddyId = urlParams.get('id') || '0';

        // Load User Preference details
        const defaultUser = { name: "Guest User", age: 24, timeSlot: "8AM-9AM" };
        const user = JSON.parse(localStorage.getItem('user')) || defaultUser;

        // Set Side Panel Info
        document.getElementById('partnerNameText').innerText = buddyName;
        document.getElementById('partnerHourText').innerText = user.timeSlot;

        // Avatar letters & colors
        const initials = buddyName.charAt(0).toUpperCase();
        document.getElementById('partnerAvatar').innerText = initials;

        function getAvatarColor(name) {
            const colors = ['#f87171', '#60a5fa', '#34d399', '#fbbf24', '#a78bfa', '#f472b6', '#22d3ee'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }
        document.getElementById('partnerAvatar').style.backgroundColor = getAvatarColor(buddyName);

        // Retrieve local chat messages array or seed default ones
        const chatKey = `chat_history_${buddyId}_${buddyName.replace(/\s+/g, '')}`;
        let chatMessages = JSON.parse(localStorage.getItem(chatKey)) || [];

        // Seed initial greeting if chat history is empty
        if (chatMessages.length === 0) {
            chatMessages = [
                {
                    sender: 'buddy',
                    text: `Hey! Glad we matched. What's your training routine for tomorrow? I saw we both preferred the ${user.timeSlot} slot!`,
                    time: getFormattedTime(new Date(Date.now() - 3600000)) // 1 hour ago
                }
            ];
            localStorage.setItem(chatKey, JSON.stringify(chatMessages));
        }

        const botReplies = [
            "Awesome! I'm planning to hit leg day tomorrow, let's crush it together!",
            "That works for me. Meet you by the entrance at 5 minutes before the hour?",
            "Sounds like a solid workout. Ready to push some heavy weight!",
            "Awesome. Let's do a 5-minute warm-up first and then jump into weights.",
            "Great! I've been looking for someone to spot me on the bench press.",
            "Let's meet up and get to training!"
        ];

        function getFormattedTime(date) {
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // 12 instead of 0
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return `${hours}:${minutes} ${ampm}`;
        }

        // Render message thread
        function renderMessages() {
            const windowDiv = document.getElementById('messagesWindow');
            windowDiv.innerHTML = '';

            chatMessages.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${msg.sender === 'user' ? 'outgoing' : 'incoming'}`;
                bubble.innerHTML = `
                    <div class="bubble-content">${msg.text}</div>
                    <div class="bubble-timestamp">${msg.time}</div>
                `;
                windowDiv.appendChild(bubble);
            });

            // Scroll to bottom
            windowDiv.scrollTop = windowDiv.scrollHeight;
        }

        // Send a message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (text === '') return;

            // Save user message
            const userMsg = {
                sender: 'user',
                text: text,
                time: getFormattedTime(new Date())
            };
            chatMessages.push(userMsg);
            localStorage.setItem(chatKey, JSON.stringify(chatMessages));
            
            // Clear input and re-render
            input.value = '';
            renderMessages();

            // Trigger typing indicator mock response
            showTypingIndicator();
        }

        function showTypingIndicator() {
            const windowDiv = document.getElementById('messagesWindow');
            
            // Create indicator element
            const indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'typing-indicator';
            indicator.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            windowDiv.appendChild(indicator);
            windowDiv.scrollTop = windowDiv.scrollHeight;

            // Trigger buddy bot response after delay
            setTimeout(() => {
                // Remove indicator
                const existingIndicator = document.getElementById('typingIndicator');
                if (existingIndicator) existingIndicator.remove();

                // Select random bot reply
                const randomReply = botReplies[Math.floor(Math.random() * botReplies.length)];

                const botMsg = {
                    sender: 'buddy',
                    text: randomReply,
                    time: getFormattedTime(new Date())
                };

                chatMessages.push(botMsg);
                localStorage.setItem(chatKey, JSON.stringify(chatMessages));
                renderMessages();
            }, 1500);
        }

        // Handle Enter keypress for inputs
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize Chat screen
        renderMessages();
    </script>
</body>
</html>
